<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Airtime | Bigotic Data</title>
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        .premium-card { 
            background: #FFFFFF; 
            border: 1px solid #E2E8F0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .brand-gradient { 
            background: linear-gradient(135deg, #0052FF 0%, #003FE6 100%); 
        }
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .spinner { 
            border: 2px solid rgba(15, 23, 42, 0.1); 
            border-left-color: #0052FF; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @keyframes slideIn {
            from { transform: translateY(-1rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="pb-28 antialiased">

    <div id="toastContainer" class="fixed top-20 right-6 z-[60] flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 z-50 opacity-0 pointer-events-none transition-opacity duration-300" onclick="toggleSidebar()"></div>
    
    <div id="sidebar-menu" class="fixed top-0 left-0 bottom-0 w-72 bg-white z-50 sidebar-transition -translate-x-full shadow-2xl flex flex-col justify-between border-r border-slate-100">
        <div class="overflow-y-auto flex-1">
            <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
                <div class="text-lg font-black tracking-tighter text-[#0052FF]">BIGOTIC<span class="text-[#0F172A]">DATA</span></div>
                <button onclick="toggleSidebar()" class="text-slate-400 hover:text-[#0F172A] cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="m-4 p-4 bg-slate-50 rounded-2xl flex items-center gap-3 border border-slate-200">
                <div class="w-10 h-10 rounded-full brand-gradient flex items-center justify-center text-white font-bold text-sm" id="sidebar-initial">B</div>
                <div class="text-left">
                    <h4 class="text-xs font-extrabold uppercase text-[#0F172A]" id="sidebar-username">User</h4>
                    <span class="text-[9px] bg-blue-100 text-[#0052FF] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider">Special Account</span>
                </div>
            </div>

            <div class="px-4 py-2 space-y-1 text-left">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest px-3 mb-2">General Menu</p>
                <a href="dashboard.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
                <a href="buy-data.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="wifi" class="w-4 h-4"></i> Buy Data</a>
                <a href="#" onclick="toggleSidebar(); return false;" class="flex items-center gap-3 px-3 py-3 rounded-xl bg-blue-50 text-[#0052FF] font-bold text-xs uppercase tracking-wider"><i data-lucide="phone" class="w-4 h-4"></i> Buy Airtime</a>
                <a href="buy-tv.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="tv" class="w-4 h-4"></i> Cable Sub</a>
                <a href="fund.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="wallet" class="w-4 h-4"></i> Fund Wallet</a>
                <a href="history.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="history" class="w-4 h-4"></i> History</a>
                
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest px-3 pt-4 mb-2">Management</p>
                <a href="settings.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="settings" class="w-4 h-4"></i> Settings</a>
            </div>
        </div>

        <div class="p-4 border-t border-slate-100 bg-slate-50">
            <button onclick="logOutAction()" class="w-full flex items-center justify-center gap-2 bg-rose-50 hover:bg-rose-100 text-rose-600 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors border border-rose-200 cursor-pointer">
                <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
            </button>
        </div>
    </div>

    <nav class="flex justify-between items-center px-6 sticky top-0 z-40 bg-white border-b border-slate-200 h-16 w-full">
        <button onclick="toggleSidebar()" class="text-[#0F172A] p-2 rounded-lg hover:bg-slate-50 transition-colors flex items-center justify-center cursor-pointer">
            <i data-lucide="more-vertical" class="w-6 h-6"></i>
        </button>

        <div class="text-xs font-extrabold uppercase tracking-widest text-[#0F172A] flex items-center gap-2">
            <i data-lucide="phone" class="w-4 h-4 text-[#0052FF]"></i> Buy Airtime
        </div>

        <div class="w-9 h-9 rounded-full border-2 border-[#0052FF]/30 p-0.5 cursor-pointer bg-slate-100 flex items-center justify-center" onclick="toggleSidebar()">
            <div class="w-full h-full rounded-full brand-gradient flex items-center justify-center text-white text-[10px] font-black uppercase" id="avatar-initial">B</div>
        </div>
    </nav>

    <main class="px-5 max-w-md mx-auto mt-6">
        <div class="flex items-center justify-between mb-6 px-1">
            <a href="dashboard.html" class="flex items-center gap-1.5 text-[#0052FF] text-xs font-extrabold uppercase tracking-wider hover:opacity-80 transition-all">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
            </a>
            <span class="text-[10px] font-bold bg-slate-200 text-slate-600 px-2.5 py-1 rounded-full uppercase tracking-wider">Instant Delivery</span>
        </div>

        <form id="airtimeForm" class="space-y-6">
            <div class="premium-card p-6 rounded-[2rem] bg-white space-y-5 text-left">
                
                <div>
                    <label class="text-[10px] text-[#0052FF] uppercase tracking-wider font-black block mb-2 ml-0.5">Select Mobile Carrier</label>
                    <div class="relative">
                        <select id="network" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-800 outline-none focus:border-[#0052FF] focus:bg-white transition-all font-bold appearance-none cursor-pointer text-sm">
                            <option value="" disabled selected>-- Choose Network --</option>
                            <option value="MTN">MTN Nigeria</option>
                            <option value="AIRTEL">Airtel Telecom</option>
                            <option value="GLO">Globacom (Glo)</option>
                            <option value="9MOBILE">9Mobile</option>
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-4 top-4.5 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-[#0052FF] uppercase tracking-wider font-black block mb-2 ml-0.5">Recipient Phone Number</label>
                    <div class="relative">
                        <input type="tel" id="phone" required placeholder="08012345678" maxlength="11" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 pr-10 text-slate-800 outline-none focus:border-[#0052FF] focus:bg-white transition-all font-bold tracking-wide text-sm placeholder:text-slate-300">
                        <i data-lucide="smartphone" class="absolute right-4 top-4 w-5 h-5 text-slate-400"></i>
                    </div>
                    <p id="network-badge" class="text-[10px] font-bold text-emerald-600 mt-2 ml-0.5 hidden transition-all duration-300 leading-normal"></p>
                </div>

                <div>
                    <label class="text-[10px] text-[#0052FF] uppercase tracking-wider font-black block mb-2 ml-0.5">Recharge Amount (₦)</label>
                    <div class="relative">
                        <input type="number" id="amount" required min="50" placeholder="Minimum value 50" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 pr-12 text-slate-800 outline-none focus:border-[#0052FF] focus:bg-white transition-all font-black text-sm placeholder:text-slate-300">
                        <span class="absolute right-4 top-4.5 font-extrabold text-[10px] bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded tracking-wide uppercase">NGN</span>
                    </div>
                </div>

            </div>

            <button type="submit" id="submitBtn" class="w-full brand-gradient hover:opacity-95 text-white py-4 rounded-xl font-black text-xs uppercase tracking-wider shadow-md transition-all flex justify-center items-center active:scale-[0.98] cursor-pointer">
                Purchase Airtime
            </button>
        </form>
    </main>

    <div id="pinGateModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closePinGate()"></div>
        <div class="bg-white max-w-xs w-full p-6 rounded-[2rem] text-center relative z-10 border border-slate-100 shadow-2xl">
            <div class="w-12 h-12 rounded-xl bg-blue-50 text-[#0052FF] mx-auto mb-3 flex items-center justify-center">
                <i data-lucide="lock" class="w-5 h-5"></i>
            </div>
            <h3 class="text-base font-black text-slate-900 mb-1 tracking-tight">Security Verification</h3>
            <p class="text-[11px] text-slate-500 mb-4">Enter your 4-digit transaction pin to finalize purchase action.</p>
            
            <form id="pinAuthForm" class="space-y-4">
                <input type="password" id="txPin" required maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-center text-xl tracking-[0.5em] outline-none focus:border-[#0052FF] focus:bg-white font-black text-slate-900 transition-all">
                <div class="flex gap-2">
                    <button type="submit" id="confirmPayBtn" class="flex-1 brand-gradient text-white py-3 rounded-lg font-bold text-xs uppercase tracking-wider cursor-pointer">Confirm</button>
                    <button type="button" onclick="closePinGate()" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-lg font-bold text-xs uppercase tracking-wider hover:bg-slate-200 cursor-pointer">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-40 px-4 pb-4 md:hidden">
        <div class="bg-white/95 backdrop-blur-md border border-slate-200 rounded-2xl h-16 shadow-[0_-10px_30px_rgba(15,23,42,0.05)] flex items-center justify-around relative px-2">
            <a href="#" onclick="return false;" class="flex flex-col items-center justify-center w-14 h-full text-[#0052FF] transition-colors">
                <i data-lucide="phone" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">Airtime</span>
            </a>
            <a href="buy-data.html" class="flex flex-col items-center justify-center w-14 h-full text-slate-400 hover:text-[#0052FF] transition-colors">
                <i data-lucide="wifi" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">Data</span>
            </a>
            <div class="relative -top-4">
                <div class="absolute inset-0 bg-[#0052FF] rounded-xl blur-md opacity-30"></div>
                <a href="dashboard.html" class="relative w-12 h-12 bg-gradient-to-tr from-[#0052FF] to-[#003FE6] rounded-xl flex items-center justify-center text-white shadow-md border border-blue-400/20">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </a>
            </div>
            <a href="history.html" class="flex flex-col items-center justify-center w-14 h-full text-slate-400 hover:text-[#0052FF] transition-colors">
                <i data-lucide="clock" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">History</span>
            </a>
            <button onclick="toggleSidebar()" class="flex flex-col items-center justify-center w-14 h-full text-slate-400 hover:text-[#0052FF] transition-colors cursor-pointer">
                <i data-lucide="more-vertical" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">Menu</span>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const airtimeForm = document.getElementById('airtimeForm');
        const submitBtn = document.getElementById('submitBtn');
        const phoneInput = document.getElementById('phone');
        const networkSelect = document.getElementById('network');
        const networkBadge = document.getElementById('network-badge');
        const pinGateModal = document.getElementById('pinGateModal');
        const pinAuthForm = document.getElementById('pinAuthForm');

        const networkPrefixes = {
            "MTN": ['0803', '0806', '0810', '0813', '0814', '0816', '0903', '0906', '0913', '0916', '0703', '0706', '0704', '0901'],
            "AIRTEL": ['0802', '0808', '0812', '0902', '0907', '0912', '0911', '0708', '0701'],
            "GLO": ['0805', '0807', '0811', '0815', '0905', '0915', '0705'],
            "9MOBILE": ['0809', '0817', '0818', '0909', '0908']
        };

        const networkIds = { "MTN": 1, "AIRTEL": 2, "GLO": 3, "9MOBILE": 4 };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-menu');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function logOutAction() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function openPinGate() {
            pinGateModal.classList.remove('hidden');
            document.getElementById('txPin').focus();
        }

        function closePinGate() {
            pinGateModal.classList.add('hidden');
            document.getElementById('txPin').value = '';
        }

        phoneInput.addEventListener('input', function() {
            let phoneNumber = this.value.replace(/\s/g, '');
            if (phoneNumber.length >= 4) {
                let prefix = phoneNumber.substring(0, 4);
                let detectedNetwork = null;

                for (const [network, prefixes] of Object.entries(networkPrefixes)) {
                    if (prefixes.includes(prefix)) {
                        detectedNetwork = network;
                        break;
                    }
                }

                if (detectedNetwork) {
                    networkSelect.value = detectedNetwork;
                    networkBadge.innerHTML = `Carrier: <span class="uppercase font-extrabold text-[#0052FF]">${detectedNetwork}</span> ✅ <br><span class="text-[9px] font-semibold text-slate-400">Note: Override if ported.</span>`;
                    networkBadge.classList.remove('hidden');
                } else {
                    networkBadge.classList.add('hidden');
                }
            } else {
                networkBadge.classList.add('hidden');
            }
        });

        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            toast.className = `toast-animate pointer-events-auto flex items-center gap-3 p-4 rounded-xl border backdrop-blur-md shadow-lg transition-all duration-300 ${
                type === 'success' 
                ? 'bg-emerald-50 border-emerald-200 text-emerald-800' 
                : 'bg-rose-50 border-rose-200 text-rose-800'
            }`;

            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `
                <i data-lucide="${iconName}" class="w-4 h-4 flex-shrink-0"></i>
                <p class="text-xs font-bold leading-tight">${message}</p>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Form interception to trigger the transaction PIN Gate Modal overlay first
        airtimeForm.addEventListener('submit', function(e) {
            e.preventDefault();
            openPinGate();
        });

        // Authorized Transaction Execution endpoint post logic processing
        pinAuthForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const currentUser = JSON.parse(localStorage.getItem('user'));
            const networkVal = networkSelect.value;
            const phoneVal = phoneInput.value.trim();
            const amountVal = parseInt(document.getElementById('amount').value);
            const pinVal = document.getElementById('txPin').value;
            const confirmPayBtn = document.getElementById('confirmPayBtn');

            if (!currentUser || !currentUser.email) {
                showNotification("Session expired. Access denied.");
                setTimeout(() => { window.location.href = "login.html"; }, 2000);
                return;
            }

            const networkNumericId = networkIds[networkVal];
            closePinGate();

            submitBtn.innerHTML = `<span class="spinner"></span>`;
            submitBtn.disabled = true;

            try {
                const response = await fetch('https://bigoticdata-backend.onrender.com/buy-airtime', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentUser.email,
                        network: networkNumericId,
                        phone: phoneVal,
                        amount: amountVal,
                        pin: pinVal
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    currentUser.balance = data.newBalance;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    
                    showNotification("Airtime Purchase Successful! 🎉", "success");
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
                } else {
                    showNotification(data.error || "Transaction pin validation failed.");
                    submitBtn.innerText = "Purchase Airtime";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showNotification("Server communication disruption. Re-attempt transaction.");
                submitBtn.innerText = "Purchase Airtime";
                submitBtn.disabled = false;
            }
        });

        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                const dynamicDisplayName = user.fullName || user.username || user.email.split('@')[0];
                document.getElementById('sidebar-username').innerText = dynamicDisplayName;
                const baseChar = dynamicDisplayName.charAt(0).toUpperCase();
                document.getElementById('avatar-initial').innerText = baseChar;
                document.getElementById('sidebar-initial').innerText = baseChar;
            }
        }
    </script>
</body>
</html>
