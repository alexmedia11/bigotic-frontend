<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigotic Data | Send Bulk SMS</title>
    <link rel="icon" type="image/png" href="../Bigoticdata.com.ng.png">
    <link rel="apple-touch-icon" href="../Bigoticdata.com.ng.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .brand-gradient { background: linear-gradient(135deg, #0052FF 0%, #003FE6 100%); }
        .premium-card { background: #FFFFFF; border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="pb-12 antialiased">

    <nav class="flex justify-between items-center px-6 bg-white border-b border-slate-200 h-16 w-full mb-6">
        <div class="flex items-center">
            <a href="dashboard.html" class="text-slate-600 hover:text-[#0052FF] p-2 rounded-lg transition-colors mr-2">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <div class="text-md font-black tracking-tighter text-[#0052FF]">BIGOTIC<span class="text-[#0F172A]">DATA</span></div>
        </div>

        <a href="dashboard.html" class="w-10 h-10 rounded-xl border border-slate-200 p-1 cursor-pointer bg-white flex items-center justify-center shadow-sm hover:border-blue-200 transition-all active:scale-95">
            <div class="w-full h-full rounded-lg bg-[#0F172A] flex items-center justify-center relative overflow-hidden">
                <span class="absolute inset-x-0 bottom-1 opacity-20 text-[6px] text-blue-400 text-center font-mono select-none pointer-events-none">~/~</span>
                <span class="text-white text-[11px] font-black tracking-tight select-none">B<span class="text-[#0052FF]">D</span></span>
            </div>
        </a>
    </nav>

    <main class="px-5 max-w-md mx-auto">
        <div class="premium-card rounded-3xl p-6">
            <h2 class="text-xl font-black tracking-tight text-slate-900 mb-6 text-center">Send Bulk SMS Gateway</h2>

            <div class="space-y-5">
                <div class="text-left">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sender ID (Max 11 Characters)</label>
                    <input type="text" id="senderName" placeholder="e.g., BIGOTIC" maxlength="11" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm font-bold text-slate-900 outline-none focus:border-[#0052FF] uppercase transition-colors">
                </div>

                <div class="text-left">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Recipient Phone Numbers</label>
                    <textarea id="recipientNumbers" rows="4" placeholder="Type or paste multiple phone numbers here (separate using commas or line-breaks)..." oninput="runSmsAnalysis()" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm font-semibold text-slate-800 outline-none focus:border-[#0052FF] transition-colors resize-none"></textarea>
                    <div class="flex justify-end mt-1 px-1">
                        <span id="label-recipients" class="text-[10px] font-extrabold text-[#0052FF] bg-blue-50 border border-blue-100 rounded px-2 py-0.5 uppercase">Recipients: 0</span>
                    </div>
                </div>

                <div class="text-left">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Message Text Box</label>
                    <textarea id="smsMessage" rows="5" placeholder="Compose your structural message content context threads here..." oninput="runSmsAnalysis()" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm font-semibold text-slate-800 outline-none focus:border-[#0052FF] transition-colors resize-none"></textarea>
                    <div class="flex justify-between mt-1 px-1 text-[10px] font-bold text-slate-400 uppercase">
                        <span id="label-chars">Characters: 0</span>
                        <span id="label-pages" class="text-[#0052FF]">Pages: 1 (160 Char/Pg)</span>
                    </div>
                </div>

                <div class="text-left">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">4-Digit Authorization Security PIN</label>
                    <input type="password" id="transactionPin" placeholder="••••" maxlength="4" class="w-full mt-1.5 bg-slate-50 border border-slate-200 rounded-xl p-4 text-center text-lg font-mono font-bold text-slate-900 tracking-widest outline-none focus:border-[#0052FF] transition-colors">
                </div>

                <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 text-center mb-2">
                    <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest block mb-0.5">Estimated Invoiced Cost</span>
                    <h3 class="text-2xl font-black text-[#0052FF]">₦<span id="total-price-ledger">0.00</span></h3>
                </div>

                <button id="sendBtn" onclick="transmitSmsPayload()" class="w-full brand-gradient text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-wider shadow-md active:scale-98 transition-all cursor-pointer">Dispatch Transmission Link</button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const retailRate = 5.00;

        function fetchRecipientTokens() {
            const numbersContent = document.getElementById('recipientNumbers').value;
            return numbersContent.split(/[\s,]+/).filter(token => token.trim().length >= 10);
        }

        function runSmsAnalysis() {
            const textContent = document.getElementById('smsMessage').value;
            const charactersCount = textContent.length;
            const cleanRecipients = fetchRecipientTokens();
            const counterRecipients = cleanRecipients.length;

            // Compute structural page block breaks based on standard 160 constraint rules
            const pageBlocks = charactersCount === 0 ? 1 : Math.ceil(charactersCount / 160);
            const absoluteCostPrice = counterRecipients * pageBlocks * retailRate;

            document.getElementById('label-recipients').innerText = `Recipients: ${counterRecipients}`;
            document.getElementById('label-chars').innerText = `Characters: ${charactersCount}`;
            document.getElementById('label-pages').innerText = `Pages: ${pageBlocks}`;
            document.getElementById('total-price-ledger').innerText = absoluteCostPrice.toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function transmitSmsPayload() {
            const user = JSON.parse(localStorage.getItem('user'));
            const userEmail = user ? user.email : null;

            const senderId = document.getElementById('senderName').value.trim();
            const recipientsList = fetchRecipientTokens();
            const bodyMessage = document.getElementById('smsMessage').value.trim();
            const securityPin = document.getElementById('transactionPin').value;
            const executionBtn = document.getElementById('sendBtn');

            if (!userEmail) {
                alert("Session invalid. Re-authenticating gateway profile.");
                window.location.href = 'login.html';
                return;
            }

            if (!senderId || recipientsList.length === 0 || !bodyMessage) {
                alert("Please satisfy all active character input structures and fields.");
                return;
            }

            if (!securityPin || securityPin.length !== 4) {
                alert("Declaring your 4-digit verification secure PIN context is mandatory.");
                return;
            }

            executionBtn.disabled = true;
            executionBtn.innerText = "Routing packet payload vectors...";

            try {
                const response = await fetch('https://bigoticdata-backend.onrender.com/send-bulksms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userEmail,
                        senderName: senderId,
                        recipientNumber: recipientsList.join(','),
                        message: bodyMessage,
                        pin: securityPin
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert("Bulk transmission packets safely dispatched across distribution lines.");
                    document.getElementById('smsMessage').value = "";
                    document.getElementById('recipientNumbers').value = "";
                    document.getElementById('transactionPin').value = "";
                    runSmsAnalysis();
                } else {
                    alert(data.error || "Carrier aggregation node rejected execution stack parameters.");
                }
            } catch (err) {
                alert("Network communication interface channel timeout failure.");
            } finally {
                executionBtn.disabled = false;
                executionBtn.innerText = "Dispatch Transmission Link";
            }
        }
    </script>
</body>
</html>
