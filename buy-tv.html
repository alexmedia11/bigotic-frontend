<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cable TV Subscription | Bigotic Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: #f8fafc; 
            min-height: 100vh; 
        }
        .dark-card { 
            background: linear-gradient(145deg, #0f172a 0%, #020617 100%); 
            border: 1px solid rgba(59, 130, 246, 0.1); 
        }
        .premium-gradient { 
            background: linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%); 
        }
        @keyframes slideIn { 
            from { transform: translateY(-1rem); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .toast-animate { 
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
    </style>
</head>
<body class="pb-28">

    <div id="toastContainer" class="fixed top-24 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <nav class="flex justify-between items-center px-6 py-5 bg-[#020617]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
        <button onclick="location.href='dashboard.html'" class="flex items-center text-sm font-bold text-blue-500">
            <i data-lucide="chevron-left" class="w-5 h-5 mr-1"></i> Back
        </button>
        <div class="text-lg font-black tracking-tighter text-blue-600">BIGOTIC<span class="text-white">DATA</span></div>
    </nav>

    <main class="px-5 max-w-md mx-auto mt-8">
        <header class="mb-8">
            <h1 class="text-3xl font-black tracking-tight">Cable TV</h1>
            <p class="text-sm text-slate-400 mt-1">Recharge your GOTv, DSTv, or StarTimes account immediately.</p>
        </header>

        <form id="cableForm" class="space-y-6">
            <div class="dark-card p-7 rounded-[2rem] shadow-2xl space-y-6">
                
                <div>
                    <label class="text-[10px] text-blue-500 uppercase tracking-[0.2em] font-black block mb-3 ml-1">Select Cable Provider</label>
                    <div class="relative">
                        <select id="cablename" required class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 transition-all font-semibold appearance-none">
                            <option value="" disabled selected>-- Choose Provider --</option>
                            <option value="dstv">DSTV</option>
                            <option value="gotv">GOTV</option>
                            <option value="startimes">STARTIMES</option>
                        </select>
                        <i data-lucide="tv" class="absolute right-5 top-5 w-5 h-5 text-slate-600 pointer-events-none"></i>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-blue-500 uppercase tracking-[0.2em] font-black block mb-3 ml-1">Package Plan</label>
                    <div class="relative">
                        <select id="cableplan" required disabled class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 transition-all font-semibold appearance-none disabled:opacity-50">
                            <option value="" disabled selected>Select provider first</option>
                        </select>
                        <i data-lucide="layers" class="absolute right-5 top-5 w-5 h-5 text-slate-600 pointer-events-none"></i>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-blue-500 uppercase tracking-[0.2em] font-black block mb-3 ml-1">SmartCard / IUC Number</label>
                    <div class="relative">
                        <input type="number" id="smartCardNumber" required placeholder="e.g. 1023456789" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 transition-all font-semibold placeholder-slate-700">
                        <i data-lucide="credit-card" class="absolute right-5 top-5 w-5 h-5 text-slate-600 pointer-events-none"></i>
                    </div>
                    <div id="verificationBox" class="hidden mt-3 px-4 py-3 rounded-xl text-xs font-bold transition-all"></div>
                </div>

            </div>

            <button type="submit" id="submitBtn" class="w-full premium-gradient py-5 rounded-2xl font-black text-sm uppercase shadow-2xl tracking-widest text-white active:scale-95 transition-all">
                Activate Subscription
            </button>
        </form>
    </main>

    <script>
        lucide.createIcons();

        const BACKEND_URL = "https://bigoticdata-backend.onrender.com";

        const cablePlans = {
            "dstv": [
                { id: "dstv-padi", name: "DSTv Padi - ₦4,400" },
                { id: "dstv-yanga", name: "DSTv Yanga - ₦6,000" },
                { id: "dstv-confam", name: "DSTv Confam - ₦11,400" },
                { id: "dstv-compact", name: "DSTv Compact - ₦19,000" },
                { id: "dstv-compact-plus", name: "DSTv Compact Plus - ₦30,000" }
            ],
            "gotv": [
                { id: "gotv-supa", name: "GOTv Supa (Monthly) - ₦11,400" },
                { id: "gotv-max", name: "GOTv Max (Monthly) - ₦8,500" },
                { id: "gotv-jolli", name: "GOTv Jolli (Monthly) - ₦5,800" },
                { id: "gotv-jinja", name: "GOTv Jinja (Monthly) - ₦3,900" },
                { id: "gotv-smallie", name: "GOTv Smallie (Monthly) - ₦1,900" }
            ],
            "startimes": [
                { id: "startimes-nova-month", name: "Nova (1 Month) - ₦2,000" },
                { id: "startimes-basic-month", name: "Basic Antenna (1 Month) - ₦3,800" },
                { id: "startimes-classic-month", name: "Classic Antenna (1 Month) - ₦5,500" },
                { id: "startimes-nova-week", name: "Nova (1 Week) - ₦650" },
                { id: "startimes-basic-week", name: "Basic Antenna (1 Week) - ₦1,550" },
                { id: "startimes-smart-week", name: "Smart Dish (1 Week) - ₦3,000" },
                { id: "startimes-classic-week", name: "Classic Antenna (1 Week) - ₦2,300" },
                { id: "startimes-super-week", name: "Super Dish (1 Week) - ₦3,000" }
            ]
        };

        const providerSelect = document.getElementById('cablename');
        const planSelect = document.getElementById('cableplan');
        const iucInput = document.getElementById('smartCardNumber');
        const verificationBox = document.getElementById('verificationBox');
        const submitBtn = document.getElementById('submitBtn');

        let isVerified = false;

        providerSelect.addEventListener('change', () => {
            const provider = providerSelect.value;
            planSelect.innerHTML = '<option value="" disabled selected>-- Select Plan --</option>';
            resetVerification();
            
            if (cablePlans[provider]) {
                cablePlans[provider].forEach(plan => {
                    const opt = document.createElement('option');
                    opt.value = plan.id;
                    opt.innerText = plan.name;
                    planSelect.appendChild(opt);
                });
                planSelect.disabled = false;
            }
            if(iucInput.value.trim().length >= 8) {
                performIUCVerification(iucInput.value.trim(), provider);
            }
        });

        iucInput.addEventListener('input', () => {
            const iuc = iucInput.value.trim();
            const provider = providerSelect.value;
            
            if (!provider) return;

            if (iuc.length >= 8 && iuc.length <= 12) {
                performIUCVerification(iuc, provider);
            } else {
                resetVerification();
            }
        });

        async function performIUCVerification(iuc, provider) {
            verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-blue-950/40 text-blue-400 border border-blue-500/20";
            verificationBox.innerText = "Verifying SmartCard Owner Account...";
            verificationBox.classList.remove('hidden');

            try {
                const response = await fetch(`${BACKEND_URL}/verify-iuc`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cable: provider, iuc: iuc })
                });
                const data = await response.json();

                if (response.ok && data.success && data.customerName) {
                    isVerified = true;
                    verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-emerald-950/40 text-emerald-400 border border-emerald-500/20";
                    verificationBox.innerText = `✅ Verified: ${data.customerName}`;
                } else {
                    isVerified = false;
                    verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-rose-950/40 text-rose-400 border border-rose-500/20";
                    verificationBox.innerText = `❌ Account Not Found: ${data.error || 'Check details'}`;
                }
            } catch (err) {
                console.error(err);
                verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-amber-950/40 text-amber-400 border border-amber-500/20";
                verificationBox.innerText = "⚠️ Verification connection timed out.";
            }
        }

        function resetVerification() {
            isVerified = false;
            verificationBox.classList.add('hidden');
            verificationBox.innerText = "";
        }

        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-animate pointer-events-auto flex items-center gap-3 p-4 rounded-2xl border backdrop-blur-xl shadow-2xl transition-all duration-300 ${
                type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-200' : 'bg-rose-950/90 border-rose-500/30 text-rose-200'
            }`;
            toast.innerHTML = `
                <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5 flex-shrink-0"></i>
                <p class="text-xs font-bold">${message}</p>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                setTimeout(() => toast.remove(), 300); 
            }, 5000);
        }

        document.getElementById('cableForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentUser = JSON.parse(localStorage.getItem('user'));

            if (!currentUser) {
                return showNotification("Please log in to continue.");
            }

            if (!isVerified) {
                return showNotification("Please enter valid, verified SmartCard details before attempting payment.");
            }

            submitBtn.innerText = "PROCESSING PAYMENT...";
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${BACKEND_URL}/buy-cable`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentUser.email,
                        cable: providerSelect.value, //  FIXED: changed key from 'cablename' to 'cable'
                        cableplan: planSelect.value,
                        smartCardNumber: iucInput.value.trim()
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    currentUser.balance = data.newBalance;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    
                    showNotification("Subscription successfully active! 🎉", "success");
                    setTimeout(() => location.href = 'dashboard.html', 2500);
                } else {
                    showNotification(data.error || "Subscription processing failed.");
                    submitBtn.innerText = "Activate Subscription";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showNotification("A network connection error occurred.");
                submitBtn.innerText = "Activate Subscription";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
