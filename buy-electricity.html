<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity | Bigotic Data</title>
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .dark-card { background: linear-gradient(145deg, #0f172a 0%, #020617 100%); border: 1px solid rgba(59, 130, 246, 0.1); }
        .premium-gradient { background: linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%); }
        @keyframes slideIn { from { transform: translateY(-1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-animate { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="pb-28">
    <div id="toastContainer" class="fixed top-24 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <nav class="flex justify-between items-center px-6 py-5 bg-[#020617]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
        <button onclick="location.href='dashboard.html'" class="flex items-center text-sm font-bold text-blue-500">
            <i data-lucide="chevron-left" class="w-5 h-5 mr-1"></i> Back
        </button>
        <div class="text-lg font-black tracking-tighter text-blue-600">BIGOTIC<span class="text-white">DATA</span></div>
    </nav>

    <main class="px-5 max-w-md mx-auto mt-8">
        <header class="mb-8">
            <h1 class="text-3xl font-black tracking-tight">Electricity</h1>
            <p class="text-sm text-slate-400 mt-1">Buy prepaid tokens or pay post-paid bills instantly.</p>
        </header>

        <form id="electricityForm" class="space-y-6">
            <div class="dark-card p-7 rounded-[2rem] shadow-2xl space-y-6">
                <div>
                    <label class="text-[10px] text-blue-500 uppercase tracking-[0.2em] font-black block mb-3 ml-1">Distribution Company (DISCO)</label>
                    <select id="disco" required class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 transition-all font-semibold appearance-none">
                        <option value="" disabled selected>-- Select Disco --</option>
                        <option value="1">Ikeja Electricity (IKEDC)</option>
                        <option value="2">Eko Electricity (EKEDC)</option>
                        <option value="3">Kano Electricity (KEDCO)</option>
                        <option value="5">Jos Electricity (JED)</option>
                        <option value="6">Ibadan Electricity (IBEDC)</option>
                        <option value="7">Kaduna Electricity (KAEDCO)</option>
                        <option value="8">Abuja Electricity (AEDC)</option>
                        <option value="9">Enugu Electric (EEDC)</option>
                        <option value="10">Benin Electric (BEDC)</option>
                        <option value="12">Aba Electric (APLE)</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] text-blue-500 uppercase tracking-[0.2em] font-black block mb-3 ml-1">Meter Type</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="meterType" value="prepaid" checked class="sr-only peer">
                            <div class="border border-white/10 peer-checked:border-blue-500 peer-checked:bg-blue-950/20 text-center py-4 rounded-xl font-bold text-xs transition-all">Prepaid</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="meterType" value="postpaid" class="sr-only peer">
                            <div class="border border-white/10 peer-checked:border-blue-500 peer-checked:bg-blue-950/20 text-center py-4 rounded-xl font-bold text-xs transition-all">Postpaid</div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-blue-500 uppercase tracking-[0.2em] font-black block mb-3 ml-1">Meter Number</label>
                    <input type="text" id="meterNumber" required placeholder="Enter Meter Number" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 transition-all font-semibold placeholder-slate-700">
                    <div id="verificationBox" class="hidden mt-3 px-4 py-3 rounded-xl text-xs font-bold transition-all"></div>
                </div>

                <div>
                    <label class="text-[10px] text-blue-500 uppercase tracking-[0.2em] font-black block mb-3 ml-1">Amount (₦)</label>
                    <input type="number" id="amount" min="100" required placeholder="e.g. 2000" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-blue-600 transition-all font-semibold placeholder-slate-700">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full premium-gradient py-5 rounded-2xl font-black text-sm uppercase shadow-2xl tracking-widest text-white active:scale-95 transition-all">
                Pay Bill
            </button>
        </form>

        <div id="tokenModal" class="fixed inset-0 bg-[#020617]/90 backdrop-blur-md hidden items-center justify-center p-6 z-50">
            <div class="dark-card p-8 rounded-[2rem] max-w-sm w-full text-center space-y-6">
                <i data-lucide="zap" class="w-12 h-12 text-yellow-500 mx-auto animate-bounce"></i>
                <h3 class="text-xl font-black">Electricity Purchased!</h3>
                <p class="text-xs text-slate-400">Copy your meter recharge token below:</p>
                <div class="bg-slate-900/80 p-5 rounded-2xl border border-white/10 text-xl font-black tracking-widest text-blue-400 select-all" id="tokenDisplay">
                    ---- ---- ---- ----
                </div>
                <button onclick="location.href='dashboard.html'" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-sm">
                    Back to Dashboard
                </button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const BACKEND_URL = "https://bigoticdata-backend.onrender.com";

        const discoSelect = document.getElementById('disco');
        const meterNumberInput = document.getElementById('meterNumber');
        const verificationBox = document.getElementById('verificationBox');
        const submitBtn = document.getElementById('submitBtn');

        let isMeterVerified = false;

        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-animate pointer-events-auto flex items-center gap-3 p-4 rounded-2xl border backdrop-blur-xl shadow-2xl transition-all duration-300 ${type === 'success' ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-200' : 'bg-rose-950/90 border-rose-500/30 text-rose-200'}`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5 flex-shrink-0"></i><p class="text-xs font-bold">${message}</p>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 5000);
        }

        // Dropdown or type change: Only trigger verification if a valid length exists, don't clear instantly
        [discoSelect, ...document.querySelectorAll('input[name="meterType"]')].forEach(element => {
            element.addEventListener('change', () => {
                const meterNum = meterNumberInput.value.trim();
                if (meterNum.length >= 9 && meterNum.length <= 15) {
                    triggerVerification();
                }
            });
        });

        // Typing event: trigger verification when character parameters are hit
        meterNumberInput.addEventListener('input', () => {
            const meterNum = meterNumberInput.value.trim();
            if (meterNum.length >= 9 && meterNum.length <= 15) {
                triggerVerification();
            } else {
                resetMeterVerification();
            }
        });

        function triggerVerification() {
            const meterNum = meterNumberInput.value.trim();
            const disco = discoSelect.value;
            const meterType = document.querySelector('input[name="meterType"]:checked').value;

            if (!disco) {
                verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-amber-950/40 text-amber-400 border border-amber-500/20";
                verificationBox.innerText = "Please choose a Distribution Company (DISCO) first.";
                verificationBox.classList.remove('hidden');
                return;
            }
            performMeterVerification(meterNum, disco, meterType);
        }

        async function performMeterVerification(meterNum, disco, meterType) {
            verificationBox.classList.remove('hidden');
            verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-blue-950/40 text-blue-400 border border-blue-500/20";
            verificationBox.innerText = "Verifying Meter Account Properties...";

            try {
                const response = await fetch(`${BACKEND_URL}/verify-meter`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ disco, meterNumber: meterNum, meterType })
                });
                
                const data = await response.json();

                if (response.ok && data.success && data.customerName) {
                    isMeterVerified = true;
                    verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-emerald-950/40 text-emerald-400 border border-emerald-500/20";
                    verificationBox.innerText = `✅ Meter Name: ${data.customerName}`;
                } else {
                    isMeterVerified = false;
                    verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-rose-950/40 text-rose-400 border border-rose-500/20";
                    verificationBox.innerText = `❌ Invalid Meter: ${data.error || 'Check inputs or credentials'}`;
                }
            } catch (err) {
                console.error(err);
                isMeterVerified = false;
                verificationBox.className = "mt-3 px-4 py-3 rounded-xl text-xs font-bold bg-amber-950/40 text-amber-400 border border-amber-500/20";
                verificationBox.innerText = "⚠️ Validation processing connection timed out.";
            }
        }

        function resetMeterVerification() {
            isMeterVerified = false;
            verificationBox.classList.add('hidden');
            verificationBox.innerText = "";
        }

        document.getElementById('electricityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentUser = JSON.parse(localStorage.getItem('user'));

            if (!currentUser) return showNotification("Please log in.");

            if (!isMeterVerified) {
                return showNotification("Please supply a valid verified account meter reference structure first.");
            }

            submitBtn.innerText = "PROCESSING...";
            submitBtn.disabled = true;

            const selectedMeterType = document.querySelector('input[name="meterType"]:checked').value;

            try {
                const response = await fetch(`${BACKEND_URL}/buy-electricity`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentUser.email,
                        disco: discoSelect.value,
                        meterType: selectedMeterType,
                        meterNumber: meterNumberInput.value.trim(),
                        amount: document.getElementById('amount').value.trim()
                    })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    currentUser.balance = data.newBalance;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    
                    if (selectedMeterType === 'prepaid' && data.token && data.token !== 'N/A' && data.token !== 'Processed Successfully') {
                        document.getElementById('tokenDisplay').innerText = data.token;
                        document.getElementById('tokenModal').classList.remove('hidden');
                        document.getElementById('tokenModal').classList.add('flex');
                    } else {
                        showNotification("Bill paid successfully! 🎉", "success");
                        setTimeout(() => location.href = 'dashboard.html', 2000);
                    }
                } else {
                    showNotification(data.error || "Payment failed.");
                    submitBtn.innerText = "Pay Bill";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showNotification("Connection error.");
                submitBtn.innerText = "Pay Bill";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
