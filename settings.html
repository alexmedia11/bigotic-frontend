<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Bigotic Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f19; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .blue-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="p-5 pb-28 flex justify-center">

    <div class="max-w-md w-full">
        <div class="flex items-center mb-8 relative">
            <button onclick="location.href='dashboard.html'" class="absolute left-0 w-10 h-10 glass rounded-full flex items-center justify-center text-blue-400 border border-blue-500/20 active:scale-90 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <div class="w-full text-center">
                <h1 id="header-name" class="text-xl font-black tracking-tight mb-1 capitalize">Loading...</h1>
                <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[9px] font-black uppercase tracking-wider px-3 py-1 rounded-full inline-flex items-center">
                    <span class="w-1.5 h-1.5 bg-blue-400 rounded-full mr-1.5"></span> Smart User
                </span>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-8">
            <button onclick="alert('Profile editing coming soon!')" class="glass rounded-2xl p-3 flex flex-col items-center justify-center text-center hover:bg-white/5 active:scale-95 transition-all">
                <i data-lucide="user-pen" class="w-5 h-5 text-blue-400 mb-2"></i>
                <span class="text-[8px] font-bold uppercase text-gray-400">Edit<br>Profile</span>
            </button>
            <button onclick="alert('Feature locked. Contact Admin.')" class="glass rounded-2xl p-3 flex flex-col items-center justify-center text-center hover:bg-white/5 active:scale-95 transition-all">
                <i data-lucide="key" class="w-5 h-5 text-blue-400 mb-2"></i>
                <span class="text-[8px] font-bold uppercase text-gray-400">Change<br>Pin</span>
            </button>
            <button onclick="alert('Update Password via Email Support')" class="glass rounded-2xl p-3 flex flex-col items-center justify-center text-center hover:bg-white/5 active:scale-95 transition-all">
                <i data-lucide="lock" class="w-5 h-5 text-blue-400 mb-2"></i>
                <span class="text-[8px] font-bold uppercase text-gray-400">Change<br>Password</span>
            </button>
            <button onclick="location.href='api-docs.html'" class="glass rounded-2xl p-3 flex flex-col items-center justify-center text-center hover:bg-white/5 active:scale-95 transition-all border border-blue-500/30 bg-blue-500/5">
                <i data-lucide="code" class="w-5 h-5 text-blue-400 mb-2"></i>
                <span class="text-[8px] font-bold uppercase text-blue-400">Developer<br>API</span>
            </button>
        </div>

        <div class="glass p-6 rounded-[2rem] border border-white/5 relative overflow-hidden space-y-6">
            <h3 class="text-gray-400 text-[10px] uppercase font-black tracking-[0.2em] flex items-center border-b border-white/5 pb-4">
                <i data-lucide="shield" class="w-4 h-4 mr-2 text-blue-400"></i> Account Details
            </h3>
            
            <div class="space-y-5">
                <div class="flex items-center space-x-4">
                    <i data-lucide="user" class="w-5 h-5 text-gray-500"></i>
                    <div>
                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Full Name</p>
                        <p id="prof-fullname" class="text-sm font-bold text-white">Not Provided</p>
                    </div>
                </div>

                <div class="flex items-center space-x-4 bg-white/5 p-3 rounded-xl -mx-3">
                    <i data-lucide="mail" class="w-5 h-5 text-gray-500"></i>
                    <div>
                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Email Address</p>
                        <p id="prof-email" class="text-sm font-semibold text-white">Loading...</p>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <i data-lucide="phone" class="w-5 h-5 text-gray-500"></i>
                    <div>
                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Phone Number</p>
                        <p id="prof-phone" class="text-sm font-bold text-white">Not Set</p>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <i data-lucide="key-round" class="w-5 h-5 text-gray-500"></i>
                        <div>
                            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">API Key</p>
                            <p id="prof-api" class="text-sm font-mono text-gray-300">Generating...</p>
                        </div>
                    </div>
                    <button onclick="copyAPIKey()" class="text-blue-400 hover:text-blue-300 p-2 glass rounded-lg transition-colors active:scale-90">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="flex items-center space-x-4">
                    <i data-lucide="calendar" class="w-5 h-5 text-gray-500"></i>
                    <div>
                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Account Status</p>
                        <p class="text-xs font-semibold text-green-400">Verified Active</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6 space-y-3">
            <button onclick="handleLogout()" class="w-full glass hover:bg-red-500/10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest text-red-400 border border-red-500/20 transition-all flex justify-center items-center active:scale-95">
                <i data-lucide="log-out" class="w-4 h-4 mr-2"></i> Sign Out
            </button>

            <div id="admin-gate-box" class="hidden">
                <button onclick="location.href='admin-dashboard.html'" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:opacity-90 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-orange-600/20 transition-all flex justify-center items-center active:scale-95">
                    <i data-lucide="sliders" class="w-4 h-4 mr-2"></i> Open Admin Control Panel
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-50 px-4 pb-4 md:hidden">
        <div class="bg-slate-950/95 backdrop-blur-md border border-white/5 rounded-3xl h-20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex items-center justify-around relative px-2">
            <a href="buy-airtime.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400">
                <i data-lucide="phone" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase">Airtime</span>
            </a>
            <a href="buy-data.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400">
                <i data-lucide="wifi" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase">Data</span>
            </a>
            <a href="dashboard.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400">
                <i data-lucide="home" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase">Home</span>
            </a>
            <a href="history.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400">
                <i data-lucide="layout-grid" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold uppercase">Services</span>
            </a>
            <div class="relative -top-5">
                <div class="absolute inset-0 bg-blue-600 rounded-2xl blur-lg opacity-40"></div>
                <a href="settings.html" class="relative w-14 h-14 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white border border-blue-400/20 active:scale-90">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Admin Security Check
        const ADMIN_EMAIL = "ichinonso650@gmail.com";

        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            
            if (!user || !user.email) {
                window.location.href = "login.html";
                return;
            }

            // Sync with backend logic: Check for fullName or username, fallback to email prefix
            const displayName = user.fullName || user.username || user.email.split('@')[0];
            const apiKey = user._id ? `bg_${user._id.substring(0, 10)}...` : "Not Available";

            document.getElementById('header-name').innerText = displayName;
            document.getElementById('prof-fullname').innerText = displayName;
            document.getElementById('prof-email').innerText = user.email;
            document.getElementById('prof-api').innerText = apiKey;
            
            // Handle Phone display fix
            if(user.phone && user.phone !== "Not Set") {
                document.getElementById('prof-phone').innerText = user.phone;
            }

            // Admin Gate visibility
            if (user.email.toLowerCase().trim() === ADMIN_EMAIL.toLowerCase().trim()) {
                document.getElementById('admin-gate-box').classList.remove('hidden');
            }
        };

        function copyAPIKey() {
            const keyText = document.getElementById('prof-api').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                alert("API Key copied to clipboard!");
            });
        }

        function handleLogout() {
            if(confirm("Log out of Bigotic Data?")) {
                localStorage.removeItem('user');
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
