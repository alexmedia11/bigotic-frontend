<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Login | Bigotic Data Secure Automation Dashboard</title>
    <meta name="title" content="Login | Bigotic Data Secure Automation Dashboard">
    <meta name="description" content="Securely log in to your Bigotic Data user dashboard channel panel. Buy cheap internet bundles, load wholesale airtime VTU, and generate automated utility bills seamlessly.">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bigoticdata.com.ng/login.html">
    <meta property="og:title" content="Login to Bigotic Data Platform">
    <meta property="og:description" content="Access your personalized distribution account panel to finalize data bundle recharges and token settlements instantly.">
    <meta property="og:image" content="https://bigoticdata.com.ng/Promo1.jpg">

    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
            min-height: 100vh;
        }
        .premium-card { 
            background: #FFFFFF; 
            border: 1px solid #E2E8F0; 
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.04);
        }
        .brand-gradient { 
            background: linear-gradient(135deg, #0052FF 0%, #003FE6 100%); 
        }
        .spinner { 
            border: 2px solid rgba(15, 23, 42, 0.1); 
            border-left-color: #FFFFFF; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @keyframes slideIn {
            from { transform: translateY(-1rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Premium Brand Animation Matrices */
        @keyframes waveBarGrowth {
            0%, 100% { height: 4px; transform: scaleY(1); }
            50% { height: 26px; transform: scaleY(1.35); background-color: #0052FF; }
        }
        @keyframes logoGentlyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-wave-bar {
            animation: waveBarGrowth 0.8s ease-in-out infinite;
        }
        .animate-logo-bounce {
            animation: logoGentlyBounce 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 antialiased">

    <div id="brand-loader-overlay" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="relative flex flex-col items-center max-w-xs text-center px-4">
            
            <div class="relative w-48 h-48 flex items-center justify-center mb-2">
                <div class="absolute w-32 h-32 bg-blue-500/10 rounded-full blur-2xl animate-pulse"></div>
                <img src="Bigoticdata.com.ng.png" alt="Bigotic Data Logo" class="relative z-10 w-full h-auto object-contain animate-logo-bounce">
            </div>

            <div class="flex items-center justify-center gap-1.5 w-32 h-8 mb-4">
                <span class="w-1.5 bg-[#0052FF] rounded-full animate-wave-bar" style="animation-delay: 0.1s; height: 4px;"></span>
                <span class="w-1.5 bg-[#0052FF] rounded-full animate-wave-bar" style="animation-delay: 0.2s; height: 12px;"></span>
                <span class="w-1.5 bg-[#003FE6] rounded-full animate-wave-bar" style="animation-delay: 0.3s; height: 20px;"></span>
                <span class="w-1.5 bg-[#0052FF] rounded-full animate-wave-bar" style="animation-delay: 0.4s; height: 14px;"></span>
                <span class="w-1.5 bg-[#003FE6] rounded-full animate-wave-bar" style="animation-delay: 0.5s; height: 4px;"></span>
            </div>

            <p id="loader-status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.25em] pl-1 animate-pulse">Securing Node Connection...</p>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <div class="max-w-md w-full">
        <div class="flex justify-center items-center mb-8">
            <a href="index.html" class="block w-48 h-auto">
                <img src="Bigoticdata.com.ng.png" alt="Bigotic Data Logo" class="w-full h-full object-contain">
            </a>
        </div>

        <div class="premium-card p-8 rounded-[2.5rem]">
            <h2 class="text-xl font-extrabold mb-1 text-slate-900 text-left tracking-tight">Welcome Back</h2>
            <p class="text-xs text-slate-400 mb-6 text-left">Access your secure automated distribution dashboard panel.</p>
            
            <form id="loginForm" class="space-y-5 text-left">
                <div>
                    <label class="text-[10px] text-slate-400 mb-1.5 block uppercase font-black tracking-wider">Email Address</label>
                    <input type="email" id="email" required placeholder="name@domain.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs font-semibold outline-none focus:border-[#0052FF] focus:bg-white text-slate-900 transition-all placeholder:text-slate-300">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-[10px] text-slate-400 block uppercase font-black tracking-wider">Account Password</label>
                        <a href="#" class="text-[9px] text-[#0052FF] uppercase font-extrabold tracking-wider hover:underline">Forgot?</a>
                    </div>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs font-bold tracking-widest outline-none focus:border-[#0052FF] focus:bg-white text-slate-900 transition-all placeholder:text-slate-300">
                </div>

                <button type="submit" id="loginBtn" class="w-full brand-gradient text-white py-4 rounded-xl font-black text-xs uppercase tracking-wider shadow-md shadow-blue-600/10 transition-all flex justify-center items-center active:scale-[0.98] cursor-pointer">
                    Login to Dashboard
                </button>
            </form>

            <p class="text-center text-slate-400 text-xs font-semibold mt-8">
                New to Bigotic Platform? <a href="signup.html" class="text-[#0052FF] font-extrabold hover:opacity-80">Sign Up Free</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            toast.className = `toast-animate pointer-events-auto flex items-center gap-3 p-4 rounded-xl border backdrop-blur-md shadow-lg transition-all duration-300 ${
                type === 'success' 
                ? 'bg-emerald-50 border-emerald-200 text-emerald-800' 
                : 'bg-rose-50 border-rose-200 text-rose-800'
            }`;

            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.innerHTML = `
                <i data-lucide="${iconName}" class="w-4 h-4 flex-shrink-0"></i>
                <p class="text-xs font-bold leading-tight">${message}</p>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const emailVal = document.getElementById('email').value.trim();
            const passwordVal = document.getElementById('password').value;

            if (passwordVal.length < 6) {
                showNotification("Security policy check failed. Passwords require a minimum length metric bounds of 6 characters.");
                return;
            }
            
            loginBtn.innerHTML = `<div class="spinner"></div>`;
            loginBtn.disabled = true;

            const liveUrl = 'https://bigoticdata-backend.onrender.com/login';

            try {
                const response = await fetch(liveUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal, password: passwordVal })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data)); 
                    
                    showNotification("Identity Authenticated! Accessing server files...", "success");
                    
                    // Fire and initiate the Bigotic corporate pulse loader animation layer
                    document.getElementById('loader-status-text').innerText = "Loading Account Panels...";
                    const overlay = document.getElementById('brand-loader-overlay');
                    overlay.classList.remove('opacity-0', 'pointer-events-none');
                    overlay.classList.add('opacity-100');
                    
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 2200);
                } else {
                    showNotification(data.error || "Authentication failed. Cross-verify email name and security keys.");
                    loginBtn.innerText = "Login to Dashboard";
                    loginBtn.disabled = false;
                }
            } catch (err) {
                console.error("LOGIN SYSTEM NETWORK FAILURE:", err);
                showNotification("Unable to reach authentication matrix server endpoints. Please retry momentarily.");
                loginBtn.innerText = "Login to Dashboard";
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
