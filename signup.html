<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Bigotic Data</title>
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #f8fafc;
        }
        .glass {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-xl w-full space-y-8">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
                BIGOTIC DATA
            </h1>
            <p class="mt-2 text-sm text-gray-400">Join thousands of smart users. Fast transactions begin here.</p>
        </div>

        <div class="glass p-8 sm:p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <h2 class="text-xl font-bold text-white mb-6">Create Account</h2>

            <form id="signupForm" class="space-y-5">
                <div>
                    <label class="text-[10px] text-blue-400 uppercase tracking-widest font-bold block mb-2">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="fullName" required placeholder="John Doe" 
                            class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm font-medium">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="text-[10px] text-blue-400 uppercase tracking-widest font-bold block mb-2">Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                                <i data-lucide="at-sign" class="w-5 h-5"></i>
                            </span>
                            <input type="text" id="username" required placeholder="johndoe" 
                                class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm font-medium">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-blue-400 uppercase tracking-widest font-bold block mb-2">Phone Number</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                                <i data-lucide="phone" class="w-5 h-5"></i>
                            </span>
                            <input type="tel" id="phoneNumber" required placeholder="08012345678" 
                                class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm font-medium">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-blue-400 uppercase tracking-widest font-bold block mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </span>
                        <input type="email" id="email" required placeholder="johndoe@example.com" 
                            class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm font-medium">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-blue-400 uppercase tracking-widest font-bold block mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm font-medium">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:opacity-90 py-4 rounded-2xl text-xs font-bold uppercase tracking-wider text-white shadow-lg transition-all transform active:scale-95 flex items-center justify-center">
                    Create My Account
                </button>
            </form>

            <p class="mt-6 text-center text-xs text-gray-400">
                Already have an account? 
                <a href="login.html" class="text-blue-400 font-bold hover:underline ml-1">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            
            submitBtn.innerText = "CONNECTING TO SERVER...";
            submitBtn.disabled = true;

            const payload = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                phone: document.getElementById('phoneNumber').value, // Corrected key to match backend
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                // IMPORTANT: Ensure this URL matches your Render Backend exactly!
                const response = await fetch('https://bigoticdata-backend.onrender.com/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Registration Successful! 🎉");
                    window.location.href = "login.html";
                } else {
                    alert(data.error || "Signup Failed");
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert("Cannot reach server. Wait 60 seconds (Render is waking up) and try again.");
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
