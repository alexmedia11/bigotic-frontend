<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Create Account | Bigotic Data Free Automated Enrollment Portal</title>
    <meta name="title" content="Create Account | Bigotic Data Free Automated Enrollment Portal">
    <meta name="description" content="Join thousands of smart digital traders. Create your free Bigotic Data account today for instant wholesale VTU airtime distribution, cheap internet bundles, and lightning-fast billing.">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bigoticdata.com.ng/signup.html">
    <meta property="og:title" content="Create a Free Account on Bigotic Data Platform">
    <meta property="og:description" content="Register your details instantly to experience absolute data automation and automated transaction delivery loops 24/7.">
    <meta property="og:image" content="https://bigoticdata.com.ng/Promo1.jpg">

    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
            min-height: 100vh;
        }
        .premium-card { 
            background: #FFFFFF; 
            border: 1px solid #E2E8F0; 
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.04);
        }
        .brand-gradient { 
            background: linear-gradient(135deg, #0052FF 0%, #003FE6 100%); 
        }
        .spinner { 
            border: 2px solid rgba(15, 23, 42, 0.1); 
            border-left-color: #FFFFFF; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @keyframes slideIn {
            from { transform: translateY(-1rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 antialiased">

    <div id="toastContainer" class="fixed top-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <div class="max-w-md w-full space-y-6">
        <div class="text-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter text-[#0052FF]">BIGOTIC<span class="text-[#0F172A]">DATA</span></a>
        </div>

        <div class="premium-card p-8 rounded-[2.5rem]">
            <h2 class="text-xl font-extrabold mb-1 text-slate-900 text-left tracking-tight">Create Account</h2>
            <p class="text-xs text-slate-400 mb-6 text-left">Join thousands of smart users. Automated utility delivery begins instantly.</p>

            <form id="signupForm" class="space-y-5 text-left">
                <div>
                    <label class="text-[10px] text-slate-400 mb-1.5 block uppercase font-black tracking-wider">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" id="fullName" required placeholder="John Doe" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-xs font-semibold text-slate-900 placeholder:text-slate-300 outline-none focus:border-[#0052FF] focus:bg-white transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 mb-1.5 block uppercase font-black tracking-wider">Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i data-lucide="at-sign" class="w-4 h-4"></i>
                            </span>
                            <input type="text" id="username" required placeholder="johndoe" 
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-xs font-semibold text-slate-900 placeholder:text-slate-300 outline-none focus:border-[#0052FF] focus:bg-white transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 mb-1.5 block uppercase font-black tracking-wider">Phone Number</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i data-lucide="phone" class="w-4 h-4"></i>
                            </span>
                            <input type="tel" id="phoneNumber" required placeholder="08012345678" maxlength="11"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-xs font-semibold text-slate-900 placeholder:text-slate-300 outline-none focus:border-[#0052FF] focus:bg-white transition-all">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-400 mb-1.5 block uppercase font-black tracking-wider">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </span>
                        <input type="email" id="email" required placeholder="johndoe@example.com" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-xs font-semibold text-slate-900 placeholder:text-slate-300 outline-none focus:border-[#0052FF] focus:bg-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-slate-400 mb-1.5 block uppercase font-black tracking-wider">Security Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" id="password" required minlength="6" placeholder="Minimum 6 characters" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-xs font-bold text-slate-900 placeholder:text-slate-300 tracking-normal outline-none focus:border-[#0052FF] focus:bg-white transition-all">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full brand-gradient text-white py-4 rounded-xl font-black text-xs uppercase tracking-wider shadow-md shadow-blue-600/10 transition-all flex justify-center items-center active:scale-[0.98] cursor-pointer">
                    Create My Account
                </button>
            </form>

            <p class="mt-6 text-center text-xs text-slate-400 font-semibold">
                Already have an account? 
                <a href="login.html" class="text-[#0052FF] font-extrabold hover:underline ml-1">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showNotification(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            toast.className = `toast-animate pointer-events-auto flex items-center gap-3 p-4 rounded-xl border backdrop-blur-md shadow-lg transition-all duration-300 ${
                type === 'success' 
                ? 'bg-emerald-50 border-emerald-200 text-emerald-800' 
                : 'bg-rose-50 border-rose-200 text-rose-800'
            }`;

            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.innerHTML = `
                <i data-lucide="${iconName}" class="w-4 h-4 flex-shrink-0"></i>
                <p class="text-xs font-bold leading-tight">${message}</p>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const passwordVal = document.getElementById('password').value;
            
            if (passwordVal.length < 6) {
                showNotification("Registration policy error. Choose a password containing at least 6 characters.");
                return;
            }

            submitBtn.innerHTML = `<div class="spinner"></div>`;
            submitBtn.disabled = true;

            const payload = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                phone: document.getElementById('phoneNumber').value, 
                email: document.getElementById('email').value,
                password: passwordVal
            };

            try {
                const response = await fetch('https://bigoticdata-backend.onrender.com/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    showNotification("Registration Successful! Redirecting to login panel... 🎉", "success");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    showNotification(data.error || "Signup configuration parameters rejected.");
                    submitBtn.innerText = "Create My Account";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                showNotification("Cannot reach server gateway profiles. It may be asleep; please retry shortly.");
                submitBtn.innerText = "Create My Account";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
