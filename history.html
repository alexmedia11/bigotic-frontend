<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | Bigotic Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .receipt-gradient { background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%); }
        /* Print styles to only print the receipt card */
        @media print {
            body * { visibility: hidden; }
            #receipt-card, #receipt-card * { visibility: visible; }
            #receipt-card { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <a href="dashboard.html" class="text-blue-400 text-xs font-bold uppercase tracking-widest hover:text-blue-300 transition-colors">← Dashboard</a>
            <h2 class="text-xl font-black">Transaction <span class="text-blue-400">Log</span></h2>
        </div>

        <div id="history-container" class="space-y-4">
            <div class="text-center py-10 opacity-50">
                <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-blue-400 rounded-full mb-2" role="status"></div>
                <p>Loading your history...</p>
            </div>
        </div>
    </div>

    <div id="receipt-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div id="receipt-card" class="receipt-gradient text-slate-900 w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl scale-95 transition-transform duration-300">
            <div class="p-6 text-center border-b border-slate-200">
                <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg">
                    <span class="text-white font-black text-xl">B</span>
                </div>
                <h3 class="font-black text-xl tracking-tight">BIGOTIC DATA</h3>
                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest mt-1">Official Transaction Receipt</p>
            </div>

            <div id="receipt-details" class="p-6 space-y-4 text-sm">
                </div>

            <div class="p-6 pt-0 flex gap-3 no-print">
                <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-3 rounded-2xl font-bold text-xs uppercase tracking-wider hover:bg-slate-800 transition-all">Print / PDF</button>
                <button onclick="closeReceipt()" class="flex-1 bg-slate-200 text-slate-600 py-3 rounded-2xl font-bold text-xs uppercase tracking-wider hover:bg-slate-300 transition-all">Close</button>
            </div>
        </div>
    </div>

    <script>
        let allTransactions = [];

        window.onload = async function() {
            let userEmail = localStorage.getItem('userEmail');
            
            if (!userEmail) {
                const currentUser = JSON.parse(localStorage.getItem('user'));
                if (currentUser && currentUser.email) userEmail = currentUser.email;
            }

            if (!userEmail) return window.location.href = 'login.html';

            const container = document.getElementById('history-container');

            try {
                const response = await fetch(`https://bigoticdata-backend.onrender.com/transactions/${userEmail}`);
                if (!response.ok) throw new Error("Fetch failed");

                allTransactions = await response.json();

                if (allTransactions && allTransactions.length > 0) {
                    container.innerHTML = '';
                    allTransactions.forEach(tx => {
                        const isDeduction = tx.type !== "Wallet Funding";
                        
                        // Fallback logic for old transactions missing 'details'
                        const displayDetails = tx.details || `${tx.type} to ${tx.recipient || 'Account'}`;

                        container.innerHTML += `
                            <div class="glass p-5 rounded-3xl flex justify-between items-center border-l-4 ${isDeduction ? 'border-red-500/50' : 'border-green-500/50'} hover:bg-white/10 transition-all cursor-pointer" onclick="openReceipt('${tx.reference}')">
                                <div class="flex-1 pr-4">
                                    <p class="text-[10px] font-black uppercase text-gray-500 tracking-widest">${tx.type || 'Transaction'}</p>
                                    <p class="text-sm font-bold mt-1 text-white leading-tight">${displayDetails}</p>
                                    <p class="text-[10px] text-gray-500 mt-2 font-medium">${new Date(tx.date).toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-lg font-black ${isDeduction ? 'text-red-400' : 'text-green-400'}">
                                        ${isDeduction ? '-' : '+'}₦${Number(tx.amount).toLocaleString()}
                                    </p>
                                    <span class="text-[9px] bg-white/5 px-2 py-1 rounded-lg uppercase font-black text-blue-400">View Receipt</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<div class="glass p-10 rounded-3xl text-center opacity-50 italic">No transactions found.</div>';
                }
            } catch (err) {
                container.innerHTML = '<div class="text-red-400 text-center py-10">Connection error. Please refresh.</div>';
            }
        };

        function openReceipt(ref) {
            const tx = allTransactions.find(t => t.reference === ref);
            if (!tx) return;

            const modal = document.getElementById('receipt-modal');
            const details = document.getElementById('receipt-details');

            details.innerHTML = `
                <div class="flex justify-between items-center pb-2 border-b border-dashed border-slate-300">
                    <span class="text-slate-400 font-bold uppercase text-[10px]">Status</span>
                    <span class="bg-green-100 text-green-600 px-2 py-0.5 rounded-full font-black text-[10px] uppercase">Successful</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400 font-bold uppercase text-[10px]">Service</span>
                    <span class="font-bold text-right">${tx.type}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400 font-bold uppercase text-[10px]">Beneficiary</span>
                    <span class="font-bold text-right">${tx.recipient || 'N/A'}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400 font-bold uppercase text-[10px]">Amount</span>
                    <span class="font-black text-lg">₦${Number(tx.amount).toLocaleString()}</span>
                </div>
                <div class="pt-2">
                    <span class="text-slate-400 font-bold uppercase text-[10px]">Reference Number</span>
                    <p class="font-mono text-[11px] break-all bg-slate-100 p-2 rounded-lg mt-1 text-slate-500">${tx.reference}</p>
                </div>
                <div class="flex justify-between pt-2">
                    <span class="text-slate-400 font-bold uppercase text-[10px]">Date & Time</span>
                    <span class="font-bold text-[11px]">${new Date(tx.date).toLocaleString()}</span>
                </div>
                <div class="mt-6 text-center">
                    <p class="text-[10px] text-slate-400 font-bold italic">Thank you for using Bigotic Data!</p>
                </div>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('receipt-card').style.transform = 'scale(1)';
            }, 10);
        }

        function closeReceipt() {
            document.getElementById('receipt-card').style.transform = 'scale(0.95)';
            setTimeout(() => {
                document.getElementById('receipt-modal').classList.add('hidden');
            }, 200);
        }
    </script>
</body>
</html>
