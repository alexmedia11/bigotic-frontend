<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigotic Data | Dashboard</title>
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f19; color: white; min-height: 100vh;}
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .blue-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="pb-28">

    <div id="coming-soon-toast" class="fixed top-[-100px] left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm transition-all duration-500 ease-out pointer-events-none">
        <div class="glass bg-[#0f172a]/90 border border-blue-500/30 rounded-2xl p-4 flex items-center space-x-3 shadow-[0_20px_40px_rgba(0,0,0,0.7),0_0_20px_rgba(59,130,246,0.15)]">
            <div class="w-10 h-10 bg-blue-500/10 border border-blue-500/30 rounded-xl flex items-center justify-center text-blue-400 shrink-0">
                <i data-lucide="construction" class="w-5 h-5"></i>
            </div>
            <div>
                <h4 class="text-xs font-black uppercase tracking-wider text-white">Feature Coming Soon</h4>
                <p class="text-[10px] text-gray-400 mt-0.5 font-semibold">We are optimizing this service for you.</p>
            </div>
        </div>
    </div>

    <nav class="flex justify-between items-center px-6 py-5 sticky top-0 z-50 bg-[#0b0f19]/80 backdrop-blur-md">
        <div class="text-xl font-black tracking-tighter text-blue-500">BIGOTIC<span class="text-white">DATA</span></div>
        <div class="flex items-center space-x-3">
            <div class="text-right">
                <p class="text-[9px] text-gray-500 uppercase font-bold leading-none">Hi,</p>
                <p id="username-display" class="text-xs font-extrabold uppercase">User</p>
            </div>
            <div onclick="location.href='settings.html'" class="w-10 h-10 rounded-full border-2 border-blue-500/30 flex items-center justify-center bg-blue-500/10 cursor-pointer">
                <span id="user-initial" class="text-blue-500 font-bold uppercase">U</span>
            </div>
        </div>
    </nav>

    <main class="px-5">
        <div class="blue-gradient rounded-[2.5rem] p-8 mb-8 shadow-[0_20px_50px_rgba(30,64,175,0.3)] relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p class="text-[10px] text-white/70 uppercase font-bold tracking-[0.2em]">Account Balance</p>
                        <h1 class="text-4xl font-black mt-2 tracking-tight">₦<span id="balance">0.00</span></h1>
                    </div>
                    <div class="bg-black/20 backdrop-blur-md px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wider">Level: Smart</div>
                </div>

                <div class="flex">
                    <button onclick="location.href='fund.html'" class="w-full bg-white text-blue-700 py-4 rounded-2xl font-black text-xs uppercase shadow-xl active:scale-95 transition-all">Fund Wallet</button>
                </div>
            </div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </div>

        <h2 class="text-[11px] font-black text-gray-500 uppercase tracking-[0.3em] mb-6 px-2">Services</h2>
        <div class="grid grid-cols-4 gap-y-8 gap-x-4 mb-10 text-center">
            
            <div onclick="location.href='buy-data.html'" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400 border border-blue-500/30">
                    <i data-lucide="wifi" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Data</p>
            </div>

            <div onclick="location.href='buy-airtime.html'" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400 border border-blue-500/30">
                    <i data-lucide="phone" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Airtime</p>
            </div>

            <div onclick="location.href='buy-electricity.html'" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400 border border-blue-500/30">
                    <i data-lucide="zap" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Electric</p>
            </div>

            <div onclick="location.href='buy-tv.html'" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400 border border-blue-500/30">
                    <i data-lucide="tv" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">TV Cable</p>
            </div>

            <div onclick="showComingSoonNotice()" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400/50 border border-blue-500/10">
                    <i data-lucide="message-square" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Bulk SMS</p>
            </div>

            <div onclick="showComingSoonNotice()" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400/50 border border-blue-500/10">
                    <i data-lucide="tag" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Coupons</p>
            </div>

            <div onclick="location.href='fund.html'" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400 border border-blue-500/30">
                    <i data-lucide="wallet" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Fund</p>
            </div>

            <div onclick="location.href='history.html'" class="group cursor-pointer">
                <div class="w-16 h-16 glass rounded-[1.5rem] mx-auto flex items-center justify-center mb-3 group-active:scale-90 transition-all shadow-lg text-blue-400 border border-blue-500/30">
                    <i data-lucide="history" class="w-6 h-6"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">History</p>
            </div>
        </div>

        <h2 class="text-[11px] font-black text-gray-500 uppercase tracking-[0.3em] mb-4 px-2">Promotions</h2>
        <div class="swiper swiper-promo w-full rounded-3xl border border-blue-500/20 bg-blue-500/5 mb-8 h-40 overflow-hidden relative">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="Promo1.jpg" alt="Promo 1" class="w-full h-full object-cover">
                </div>
                <div class="swiper-slide">
                    <img src="Promo2.jpg" alt="Promo 2" class="w-full h-full object-cover">
                </div>
                <div class="swiper-slide">
                    <img src="Promo3.jpg" alt="Promo 3" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 px-4 pb-4 md:hidden">
        <div class="bg-slate-950/95 backdrop-blur-md border border-white/5 rounded-3xl h-20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex items-center justify-around relative px-2">
            
            <a href="buy-airtime.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400 hover:text-blue-500 transition-colors">
                <i data-lucide="phone" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-wider uppercase">Airtime</span>
            </a>

            <a href="buy-data.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400 hover:text-blue-500 transition-colors">
                <i data-lucide="wifi" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-wider uppercase">Data</span>
            </a>

            <div class="relative -top-5">
                <div class="absolute inset-0 bg-blue-600 rounded-2xl blur-lg opacity-40"></div>
                <a href="dashboard.html" class="relative w-14 h-14 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg border border-blue-400/20 active:scale-90 transition-all">
                    <i data-lucide="home" class="w-6 h-6"></i>
                </a>
            </div>

            <a href="history.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400 hover:text-blue-500 transition-colors">
                <i data-lucide="clock" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-wider uppercase">History</span>
            </a>

            <a href="settings.html" class="flex flex-col items-center justify-center w-14 h-full text-gray-400 hover:text-blue-500 transition-colors">
                <i data-lucide="settings" class="w-5 h-5 mb-1"></i>
                <span class="text-[9px] font-bold tracking-wider uppercase">Settings</span>
            </a>

        </div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

    <script>
        lucide.createIcons();

        const swiper = new Swiper('.swiper-promo', {
            loop: true,
            autoplay: { delay: 4000, disableOnInteraction: false },
            pagination: { el: '.swiper-pagination', clickable: true },
        });

        function updateBalanceUI(balanceValue) {
            const rawBalance = parseFloat(balanceValue) || 0;
            document.getElementById('balance').innerText = rawBalance.toLocaleString('en-NG', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            });
        }

        // PREMIUM APP ENGINE ANNOUNCEMENT TOAST FUNCTIONALITY
        let toastTimeout;
        function showComingSoonNotice() {
            const toast = document.getElementById('coming-soon-toast');
            
            // Clear any active transitions if running
            clearTimeout(toastTimeout);
            
            // Bring toast into user context view smoothly
            toast.style.top = "24px";
            
            // Leave visible for premium engagement then slide out securely
            toastTimeout = setTimeout(() => {
                toast.style.top = "-100px";
            }, 3000);
        }

        window.onload = async function() {
            const user = JSON.parse(localStorage.getItem('user'));
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const dynamicDisplayName = user.fullName || user.username || user.email.split('@')[0];
            document.getElementById('username-display').innerText = dynamicDisplayName;
            document.getElementById('user-initial').innerText = dynamicDisplayName.charAt(0).toUpperCase();

            updateBalanceUI(user.balance);

            if (user.email) {
                try {
                    const response = await fetch(`https://bigoticdata-backend.onrender.com/user-profile?email=${encodeURIComponent(user.email)}&t=${new Date().getTime()}`);
                    if (response.ok) {
                        const result = await response.json();
                        
                        let freshBalance = undefined;
                        if (result.balance !== undefined) freshBalance = result.balance;
                        else if (result.user && result.user.balance !== undefined) freshBalance = result.user.balance;
                        else if (result.data && result.data.balance !== undefined) freshBalance = result.data.balance;

                        if (freshBalance !== undefined) {
                            user.balance = freshBalance;
                            localStorage.setItem('user', JSON.stringify(user));
                            updateBalanceUI(freshBalance);
                        }
                    }
                } catch (err) {
                    console.log("Realtime wallet background sync paused.", err);
                }
            }
        };
    </script>
</body>
</html>
