<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Wallet | Bigotic Data</title>
    <link rel="icon" type="image/png" href="../Bigoticdata.com.ng.png">
    <link rel="apple-touch-icon" href="../Bigoticdata.com.ng.png">
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #0F172A; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        .premium-card { 
            background: #FFFFFF; 
            border: 1px solid #E2E8F0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .brand-gradient { 
            background: linear-gradient(135deg, #0052FF 0%, #003FE6 100%); 
        }
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .spinner { 
            border: 2px solid rgba(15, 23, 42, 0.1); 
            border-left-color: #0052FF; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-28 antialiased">

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 z-50 opacity-0 pointer-events-none transition-opacity duration-300" onclick="toggleSidebar()"></div>
    
    <div id="sidebar-menu" class="fixed top-0 left-0 bottom-0 w-72 bg-white z-50 sidebar-transition -translate-x-full shadow-2xl flex flex-col justify-between border-r border-slate-100">
        <div class="overflow-y-auto flex-1">
            <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
                <div class="text-lg font-black tracking-tighter text-[#0052FF]">BIGOTIC<span class="text-[#0F172A]">DATA</span></div>
                <button onclick="toggleSidebar()" class="text-slate-400 hover:text-[#0F172A] cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="m-4 p-4 bg-slate-50 rounded-2xl flex items-center gap-3 border border-slate-200">
                <div class="w-10 h-10 rounded-full brand-gradient flex items-center justify-center text-white font-bold text-sm" id="sidebar-initial">B</div>
                <div class="text-left">
                    <h4 class="text-xs font-extrabold uppercase text-[#0F172A]" id="sidebar-username">User</h4>
                    <span class="text-[9px] bg-blue-100 text-[#0052FF] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider">Special Account</span>
                </div>
            </div>

            <div class="px-4 py-2 space-y-1 text-left">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest px-3 mb-2">General Menu</p>
                <a href="dashboard.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
                <a href="buy-data.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="wifi" class="w-4 h-4"></i> Buy Data</a>
                <a href="buy-airtime.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="phone" class="w-4 h-4"></i> Buy Airtime</a>
                <a href="buy-tv.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="tv" class="w-4 h-4"></i> Cable Sub</a>
                <a href="#" onclick="toggleSidebar(); return false;" class="flex items-center gap-3 px-3 py-3 rounded-xl bg-blue-50 text-[#0052FF] font-bold text-xs uppercase tracking-wider"><i data-lucide="wallet" class="w-4 h-4"></i> Fund Wallet</a>
                <a href="history.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="history" class="w-4 h-4"></i> History</a>
                
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest px-3 pt-4 mb-2">Management</p>
                <a href="settings.html" class="flex items-center gap-3 px-3 py-3 rounded-xl text-slate-600 hover:bg-slate-50 font-bold text-xs uppercase tracking-wider"><i data-lucide="settings" class="w-4 h-4"></i> Settings</a>
            </div>
        </div>

        <div class="p-4 border-t border-slate-100 bg-slate-50">
            <button onclick="logOutAction()" class="w-full flex items-center justify-center gap-2 bg-rose-50 hover:bg-rose-100 text-rose-600 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition-colors border border-rose-200 cursor-pointer">
                <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
            </button>
        </div>
    </div>

    <nav class="flex justify-between items-center px-6 sticky top-0 z-40 bg-white border-b border-slate-200 h-16 w-full">
        <button onclick="toggleSidebar()" class="text-[#0F172A] p-2 rounded-lg hover:bg-slate-50 transition-colors flex items-center justify-center cursor-pointer">
            <i data-lucide="more-vertical" class="w-6 h-6"></i>
        </button>

        <div class="text-xs font-extrabold uppercase tracking-widest text-[#0F172A] flex items-center gap-2">
            <i data-lucide="wallet" class="w-4 h-4 text-[#0052FF]"></i> Fund Wallet
        </div>

        <div onclick="toggleSidebar()" class="w-10 h-10 rounded-xl border border-slate-200 p-1 cursor-pointer bg-white flex items-center justify-center shadow-sm hover:border-blue-200 transition-all active:scale-95">
            <div class="w-full h-full rounded-lg bg-[#0F172A] flex items-center justify-center relative overflow-hidden">
                <span class="absolute inset-x-0 bottom-1 opacity-20 text-[6px] text-blue-400 text-center font-mono select-none pointer-events-none">~/~</span>
                <span class="text-white text-[11px] font-black tracking-tight select-none">B<span class="text-[#0052FF]">D</span></span>
            </div>
        </div>
    </nav>

    <main class="px-5 max-w-md mx-auto mt-6">
        <div class="flex items-center justify-between mb-6 px-1">
            <a href="dashboard.html" class="flex items-center gap-1.5 text-[#0052FF] text-xs font-extrabold uppercase tracking-wider hover:opacity-80 transition-all">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
            </a>
        </div>

        <div class="premium-card p-6 rounded-[2rem] bg-white">
            <p class="text-[9px] text-slate-400 mb-6 uppercase tracking-widest font-extrabold text-center">Secure Funding via Paystack Gateway</p>
            
            <form id="paymentForm" class="space-y-6">
                <div class="text-left">
                    <label class="text-[10px] text-[#0052FF] mb-2 block uppercase font-black tracking-widest">Deposit Amount</label>
                    <div class="relative group">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-xl font-bold text-slate-400 group-focus-within:text-[#0052FF] transition-colors">₦</span>
                        <input type="number" id="amount" required placeholder="0.00" min="100" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 pl-10 text-xl outline-none focus:border-[#0052FF] focus:bg-white transition-all font-bold text-slate-900 placeholder:text-slate-300">
                    </div>
                    <div class="flex justify-between mt-3 px-1">
                        <span class="text-[9px] text-slate-400 font-bold uppercase italic">Minimum: ₦100.00</span>
                        <span class="text-[9px] text-emerald-600 font-bold uppercase tracking-wide flex items-center"><i data-lucide="shield-check" class="w-3 h-3 mr-1"></i> End-to-End Secured</span>
                    </div>
                </div>

                <button type="submit" id="payBtn" class="w-full brand-gradient text-white py-4 rounded-xl font-black text-xs uppercase tracking-wider shadow-md shadow-blue-600/10 transition-all flex justify-center items-center active:scale-[0.98] cursor-pointer">
                    Proceed To Checkout
                </button>
            </form>
        </div>
    </main>

    <div id="statusModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="if(!document.getElementById('modalBtn').classList.contains('hidden')) statusModal.classList.add('hidden')"></div>
        <div class="bg-white max-w-xs w-full p-8 rounded-[2rem] text-center relative z-10 border border-slate-100 shadow-2xl scale-100 transition-transform">
            <div id="modalIcon" class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                </div>
            <h3 id="modalTitle" class="text-base font-black text-slate-900 mb-1.5 tracking-tight"></h3>
            <p id="modalMsg" class="text-xs text-slate-500 leading-relaxed mb-5 px-1"></p>
            <button id="modalBtn" class="w-full py-3.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all cursor-pointer"></button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-40 px-4 pb-4 md:hidden">
        <div class="bg-white/95 backdrop-blur-md border border-slate-200 rounded-2xl h-16 shadow-[0_-10px_30px_rgba(15,23,42,0.05)] flex items-center justify-around relative px-2">
            <a href="buy-airtime.html" class="flex flex-col items-center justify-center w-14 h-full text-slate-400 hover:text-[#0052FF] transition-colors">
                <i data-lucide="phone" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">Airtime</span>
            </a>
            <a href="buy-data.html" class="flex flex-col items-center justify-center w-14 h-full text-slate-400 hover:text-[#0052FF] transition-colors">
                <i data-lucide="wifi" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">Data</span>
            </a>
            <div class="relative -top-4">
                <div class="absolute inset-0 bg-[#0052FF] rounded-xl blur-md opacity-30"></div>
                <a href="dashboard.html" class="relative w-12 h-12 bg-gradient-to-tr from-[#0052FF] to-[#003FE6] rounded-xl flex items-center justify-center text-white shadow-md border border-blue-400/20">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </a>
            </div>
            <a href="history.html" class="flex flex-col items-center justify-center w-14 h-full text-slate-400 hover:text-[#0052FF] transition-colors">
                <i data-lucide="clock" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">History</span>
            </a>
            <button onclick="toggleSidebar()" class="flex flex-col items-center justify-center w-14 h-full text-slate-400 hover:text-[#0052FF] transition-colors cursor-pointer">
                <i data-lucide="more-vertical" class="w-4 h-4 mb-1"></i>
                <span class="text-[8px] font-bold tracking-wider uppercase">Menu</span>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const paymentForm = document.getElementById('paymentForm');
        const payBtn = document.getElementById('payBtn');
        const statusModal = document.getElementById('statusModal');
        const BACKEND_URL = "https://bigoticdata-backend.onrender.com";

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-menu');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function logOutAction() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function showStatus(type, title, msg, btnText, action = null) {
            const iconBox = document.getElementById('modalIcon');
            const btn = document.getElementById('modalBtn');
            
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = msg;
            btn.innerText = btnText;

            iconBox.className = "w-12 h-12 rounded-xl mx-auto mb-4 flex items-center justify-center ";
            btn.className = "w-full py-3.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all ";

            if (type === 'loading') {
                iconBox.innerHTML = `<div class="spinner"></div>`;
                iconBox.classList.add('bg-blue-50');
                btn.classList.add('hidden'); 
            } else if (type === 'success') {
                iconBox.innerHTML = `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-600"></i>`;
                iconBox.classList.add('bg-emerald-50');
                btn.classList.add('bg-[#0F172A]', 'text-white', 'hover:opacity-90');
                btn.classList.remove('hidden');
            } else {
                iconBox.innerHTML = `<i data-lucide="alert-circle" class="w-6 h-6 text-rose-600"></i>`;
                iconBox.classList.add('bg-rose-50');
                btn.classList.add('bg-rose-600', 'text-white', 'hover:bg-rose-700');
                btn.classList.remove('hidden');
            }

            statusModal.classList.remove('hidden');
            lucide.createIcons();

            btn.onclick = action ? action : () => statusModal.classList.add('hidden');
        }

        paymentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user) {
                showStatus('error', 'Auth Required', 'Please log in to fund your account.', 'Login', () => location.href='login.html');
                return;
            }

            payBtn.innerHTML = `<div class="spinner !border-left-color-white mr-2.5"></div> INITIALIZING...`;
            payBtn.disabled = true;

            const handler = PaystackPop.setup({
                key: 'pk_live_8b224c134d4236b808b2d779e4a5dd9d33c7adc2',
                email: user.email,
                amount: amount * 100,
                currency: "NGN",
                callback: function(response) {
                    showStatus('loading', 'Verifying...', 'Please wait while we confirm your transaction.', '');
                    
                    fetch(`${BACKEND_URL}/verify-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ reference: response.reference, email: user.email })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            user.balance = data.newBalance;
                            localStorage.setItem('user', JSON.stringify(user));
                            showStatus('success', 'Wallet Funded!', `₦${amount.toLocaleString()} successfully added to your balance.`, 'Go to Dashboard', () => location.href='dashboard.html');
                        } else {
                            showStatus('error', 'Failed', data.error || 'Verification failed', 'Retry');
                            resetPayBtn();
                        }
                    })
                    .catch(() => {
                        showStatus('error', 'Network Error', 'Check your connection and try again.', 'Close');
                        resetPayBtn();
                    });
                },
                onClose: function() {
                    resetPayBtn();
                }
            });
            handler.openIframe();
        });

        function resetPayBtn() {
            payBtn.innerText = "Proceed To Checkout";
            payBtn.disabled = false;
        }

        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            const dynamicDisplayName = user.fullName || user.username || user.email.split('@')[0];
            document.getElementById('sidebar-username').innerText = dynamicDisplayName;
            const baseChar = dynamicDisplayName.charAt(0).toUpperCase();
            document.getElementById('avatar-initial').innerText = baseChar;
            document.getElementById('sidebar-initial').innerText = baseChar;
        }
    </script>
</body>
</html>
